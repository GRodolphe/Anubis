# Example: obfuscate a Python script in GitHub Actions.
# Customize the `run:` line with your actual file path and flags.
# The CI=true env var is set automatically by GitHub Actions,
# so --ci is optional here — but explicit is clearer.

name: Obfuscate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  obfuscate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Anubis
        run: pip install git+https://github.com/GRodolphe/Anubis.git

      - name: Obfuscate
        run: anubis example/script.py --ci --carbon --junk --output dist/script-obf.py

      - name: Upload obfuscated artifact
        uses: actions/upload-artifact@v4
        with:
          name: obfuscated-script
          path: dist/
